name: Deploy to AWS (ECS Fargate)

on:
  push:
    branches:
      - main
  workflow_dispatch: # Permite disparar manualmente

env:
  PROJECT_NAME: devai
  ENVIRONMENT: dev
  BACKEND_BUCKET: ${{ vars.BACKEND_BUCKET }}
  TF_VAR_project_name: devai
  TF_VAR_environment: dev
  AUTOMATION: true
  AWS_EC2_METADATA_DISABLED: true
  TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
  NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
  NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
  CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
  CLERK_JWT_KEY: ${{ secrets.CLERK_JWT_KEY }}
  JWT_SECRET: ${{ secrets.JWT_SECRET }}
  TF_VAR_aws_region: ${{ secrets.AWS_REGION }}
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}

jobs:
  changes:
    name: Check for Changes
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.filter.outputs.apps }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            apps:
              - 'apps/**'
            infra:
              - 'infra/**'

  quality:
    name: Lint & Test
    #needs: changes
    #if: needs.changes.outputs.apps == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint Backend
        run: npm run lint --workspace=backend

      - name: Gerar schema
        run: npm run prisma:generate --workspace=backend

      - name: Test Backend
        run: npm run test --workspace=backend

      - name: Lint Frontend
        run: npm run lint --workspace=frontend

  terraform:
    name: Terraform Apply
    #needs: [changes, quality]
    needs: [quality]
    outputs:
      alb_dns_name: ${{ steps.outputs.outputs.alb_dns_name }}
    # if: |
    #   always() &&
    #   (needs.changes.outputs.infra == 'true' || github.event_name == 'workflow_dispatch') &&
    #   (needs.quality.result == 'success' || needs.quality.result == 'skipped')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./infra/environments/dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Ensure Terraform State Bucket
        run: |
          BUCKET_NAME="${{ env.BACKEND_BUCKET }}"
          REGION="${{ env.AWS_REGION }}"
          echo "Checking bucket $BUCKET_NAME in region $REGION..."
          
          if ! aws s3api head-bucket --bucket "$BUCKET_NAME" --region "$REGION" 2>/dev/null; then
            echo "Bucket $BUCKET_NAME not found. Creating..."
            if [ "$REGION" = "us-east-1" ]; then
              aws s3api create-bucket --bucket "$BUCKET_NAME" --region "$REGION"
            else
              aws s3api create-bucket --bucket "$BUCKET_NAME" --region "$REGION" --create-bucket-configuration LocationConstraint="$REGION"
            fi
            
            echo "Waiting for bucket to be available..."
            aws s3api wait bucket-exists --bucket "$BUCKET_NAME"
            
            echo "Configuring versioning..."
            aws s3api put-bucket-versioning --bucket "$BUCKET_NAME" --versioning-configuration Status=Enabled
            
            echo "Configuring encryption..."
            aws s3api put-bucket-encryption --bucket "$BUCKET_NAME" --server-side-encryption-configuration '{"Rules": [{"ApplyServerSideEncryptionByDefault": {"SSEAlgorithm": "AES256"}}]}'
          else
            echo "Bucket $BUCKET_NAME already exists."
          fi

      - name: Terraform Init
        run: terraform init -input=false -backend-config="bucket=${{ env.BACKEND_BUCKET }}"

      - name: Terraform Validate
        run: terraform validate -no-color

      - name: Terraform Plan
        run: terraform plan -input=false -no-color

      - name: Terraform Apply
        run: |
          terraform apply -input=false -auto-approve -no-color \
            -replace="module.compute.aws_ecs_task_definition.backend" \
            -replace="module.compute.aws_ecs_task_definition.frontend"

      - name: Set outputs
        id: outputs
        run: |
          ALB_DNS=$(terraform output -raw alb_dns_name)
          echo "alb_dns_name=$ALB_DNS" >> $GITHUB_OUTPUT


      - name: Update AWS Secrets
        run: |
          # Obter outputs do Terraform
          DB_ADDRESS=$(terraform output -raw db_instance_address)
          ALB_DNS=$(terraform output -raw alb_dns_name)
          SECRET_ARN=$(terraform output -raw secret_arn)
          
          if [ -z "$SECRET_ARN" ] || [ "$SECRET_ARN" == "null" ]; then
            echo "Error: secret_arn output not found from Terraform."
            exit 1
          fi

          # Construir variáveis
          DATABASE_URL="postgresql://postgres:${{ secrets.DB_PASSWORD }}@${DB_ADDRESS}:5432/devai?schema=public"
          DIRECT_URL="postgresql://postgres:${{ secrets.DB_PASSWORD }}@${DB_ADDRESS}:5432/devai?schema=public"
          NEXT_PUBLIC_API_URL="http://${ALB_DNS}/api/v1"
          
          echo "Updating secrets in Secrets Manager..."
          echo "Secret ARN: $SECRET_ARN"
          
          # Obter segredos atuais - falha graciosamente se não houver versão atual
          CURRENT_SECRETS=$(aws secretsmanager get-secret-value --secret-id "$SECRET_ARN" --region "${{ env.AWS_REGION }}" --query SecretString --output text 2>/dev/null || echo "{}")
          
          if [ -z "$CURRENT_SECRETS" ] || [ "$CURRENT_SECRETS" == "None" ] || [ "$CURRENT_SECRETS" == "null" ]; then
            CURRENT_SECRETS="{}"
          fi

          # Mesclar com os novos valores usando jq de forma robusta
          UPDATED_SECRETS=$(echo "$CURRENT_SECRETS" | jq \
            --arg db_url "$DATABASE_URL" \
            --arg direct_url "$DIRECT_URL" \
            --arg api_url "$NEXT_PUBLIC_API_URL" \
            --arg clerk_secret "$CLERK_SECRET_KEY" \
            --arg clerk_jwt "$CLERK_JWT_KEY" \
            --arg jwt_secret "$JWT_SECRET" \
            --arg clerk_publishable_key "$NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY" \
            '. + {
              DATABASE_URL: $db_url,
              DIRECT_URL: $direct_url,
              NEXT_PUBLIC_API_URL: $api_url,
              CLERK_SECRET_KEY: $clerk_secret,
              CLERK_JWT_KEY: $clerk_jwt,
              JWT_SECRET: $jwt_secret,
              NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: $clerk_publishable_key
            }')
          
          # Validar se o JSON gerado é válido antes de enviar
          if ! echo "$UPDATED_SECRETS" | jq empty; then
            echo "Error: Generated secrets JSON is invalid."
            exit 1
          fi

          # Atualizar no AWS Secrets Manager
          aws secretsmanager put-secret-value \
            --secret-id "$SECRET_ARN" \
            --secret-string "$UPDATED_SECRETS" \
            --region "${{ env.AWS_REGION }}"
          
          echo "Secrets updated successfully in AWS Secrets Manager."

  build-and-push:
    name: Build and Push to ECR
    needs: [quality, terraform]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

       # Backend Build & Push
      - name: Build and push Backend image to Amazon ECR
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE: ${{ env.PROJECT_NAME }}-backend
        # run: |
        #   docker build \
        #     -t $REGISTRY/$IMAGE:${{ github.sha }} \
        #     -t $REGISTRY/$IMAGE:latest \
        #     -f apps/backend/Dockerfile .
        #   docker push --all-tags $REGISTRY/$IMAGE
        run: |
          docker build \
            -t $REGISTRY/$IMAGE:latest \
            -f apps/backend/Dockerfile .
          docker push --all-tags $REGISTRY/$IMAGE          

      # Frontend Build & Push
      - name: Build and push Frontend image to Amazon ECR
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE: ${{ env.PROJECT_NAME }}-frontend
          ALB_DNS: ${{ needs.terraform.outputs.alb_dns_name }}
          CLERK_PUB_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=http://$ALB_DNS/api/v1 \
            --build-arg NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=$CLERK_PUB_KEY \
            -t $REGISTRY/$IMAGE:latest \
            -f apps/frontend/Dockerfile .
          docker push --all-tags $REGISTRY/$IMAGE
  deploy:
    name: Deploy to ECS
    #needs: [changes, build-and-push, terraform]
    needs: [build-and-push, terraform]
    # if: |
    #   always() &&
    #   (needs.changes.outputs.apps == 'true' || needs.changes.outputs.infra == 'true' || github.event_name == 'workflow_dispatch') &&
    #   (needs.build-and-push.result == 'success' || needs.build-and-push.result == 'skipped') &&
    #   (needs.terraform.result == 'success' || needs.terraform.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Update ECS Backend Service
        run: |
          aws ecs update-service --cluster ${{ env.PROJECT_NAME }}-cluster --service ${{ env.PROJECT_NAME }}-backend-service --force-new-deployment --region ${{ env.AWS_REGION }}

      - name: Update ECS Frontend Service
        run: |
          aws ecs update-service --cluster ${{ env.PROJECT_NAME }}-cluster --service ${{ env.PROJECT_NAME }}-frontend-service --force-new-deployment --region ${{ env.AWS_REGION }}
