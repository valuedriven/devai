name: Deploy to AWS (ECS Fargate)

on:
  push:
    branches:
      - main
  workflow_dispatch: # Permite disparar manualmente

env:
  PROJECT_NAME: devai
  ENVIRONMENT: dev
  TF_VAR_project_name: devai
  TF_VAR_environment: dev
  AUTOMATION: true
  AWS_EC2_METADATA_DISABLED: true
  AWS_PAGER: ""
  TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
  NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
  NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
  CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
  CLERK_JWT_KEY: ${{ secrets.CLERK_JWT_KEY }}
  JWT_SECRET: ${{ secrets.JWT_SECRET }}
  TF_VAR_aws_region: ${{ secrets.AWS_REGION }}
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
  ADMIN_EMAIL: ${{ vars.ADMIN_EMAIL }}
  ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
  CUSTOMER_EMAIL: ${{ vars.CUSTOMER_EMAIL }}
  CUSTOMER_PASSWORD: ${{ secrets.CUSTOMER_PASSWORD }}


jobs:  
  lint-unit-test:
    name: Lint & Unit Testing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
      
      - name: Unit Test 
        run: npm run test:unit      

  integration-e2e-tests:
    name: Integration & E2E Testing
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://user:password@127.0.0.1:5432/dbname?schema=public
      DIRECT_URL: postgresql://user:password@127.0.0.1:5432/dbname?schema=public
      NEXT_PUBLIC_API_URL: http://127.0.0.1:3001/api/v1
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Start Database
        run: docker compose up -d db

      - name: Gerar schema
        run: npm run prisma:generate --workspace=backend

      - name: Database Setup
        run: npm run db:reset
        working-directory: apps/backend

      - name: Integration Test 
        run: npm run test:integration

      - name: free port 
        run: npx --yes kill-port 3001 || true

      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps
        working-directory: apps/frontend

      - name: Run Playwright tests
        run: npx playwright test --project=cicd
        working-directory: apps/frontend
        
      # - name: Upload Playwright reports
      #   uses: actions/upload-artifact@v4
      #   if: ${{ !cancelled() }}
      #   with:
      #     name: playwright-report
      #     path: apps/frontend/playwright-report/
      #     retention-days: 30


  terraform:
    name: Terraform Apply
    outputs:
      alb_dns_name: ${{ steps.outputs.outputs.alb_dns_name }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./infra/environments/dev
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Verify AWS CLI
        run: aws --version

      - name: Ensure Terraform State Bucket
        id: tf-state-bucket
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          BUCKET_NAME="devai-tfstate-${ACCOUNT_ID}"
          REGION="${{ env.AWS_REGION }}"
          echo "bucket=$BUCKET_NAME" >> $GITHUB_OUTPUT
          echo "Using bucket $BUCKET_NAME in region $REGION (account $ACCOUNT_ID)..."
          
          if ! aws s3api head-bucket --bucket "$BUCKET_NAME" 2>/dev/null; then
            echo "Bucket $BUCKET_NAME not found. Creating..."
            if [ "$REGION" = "us-east-1" ]; then
              aws s3api create-bucket --bucket "$BUCKET_NAME" --region "$REGION" --no-cli-pager
            else
              aws s3api create-bucket --bucket "$BUCKET_NAME" --region "$REGION" --create-bucket-configuration LocationConstraint="$REGION" --no-cli-pager
            fi
            
            echo "Waiting for bucket to be available..."
            aws s3api wait bucket-exists --bucket "$BUCKET_NAME"
            
            echo "Configuring versioning..."
            aws s3api put-bucket-versioning --bucket "$BUCKET_NAME" --versioning-configuration Status=Enabled
            
            echo "Configuring encryption..."
            aws s3api put-bucket-encryption --bucket "$BUCKET_NAME" --server-side-encryption-configuration '{"Rules": [{"ApplyServerSideEncryptionByDefault": {"SSEAlgorithm": "AES256"}}]}'
          else
            echo "Bucket $BUCKET_NAME already exists."
          fi

      - name: Terraform Init
        run: terraform init -input=false -backend-config="bucket=${{ steps.tf-state-bucket.outputs.bucket }}"

      - name: Terraform Validate
        run: terraform validate -no-color

      - name: Terraform Plan
        run: terraform plan -input=false -no-color

      - name: Terraform Apply
        run: |
          terraform apply -input=false -auto-approve -no-color

      - name: Set outputs
        id: outputs
        run: |
          ALB_DNS=$(terraform output -raw alb_dns_name)
          echo "alb_dns_name=$ALB_DNS" >> $GITHUB_OUTPUT


      - name: Update AWS Secrets
        run: |
          # Obter outputs do Terraform
          DB_ADDRESS=$(terraform output -raw db_instance_address)
          DB_NAME=$(terraform output -raw db_name)
          ALB_DNS=$(terraform output -raw alb_dns_name)
          SECRET_ARN=$(terraform output -raw secret_arn)
          
          if [ -z "$SECRET_ARN" ] || [ "$SECRET_ARN" == "null" ]; then
            echo "Error: secret_arn output not found from Terraform."
            exit 1
          fi

          # Construir variáveis
          DATABASE_URL="postgresql://postgres:${{ secrets.DB_PASSWORD }}@${DB_ADDRESS}:5432/${DB_NAME}?sslmode=no-verify&schema=public"
          DIRECT_URL="postgresql://postgres:${{ secrets.DB_PASSWORD }}@${DB_ADDRESS}:5432/${DB_NAME}?sslmode=no-verify&schema=public"
          NEXT_PUBLIC_API_URL="http://${ALB_DNS}/api/v1"
          
          echo "Updating secrets in Secrets Manager..."
          echo "Secret ARN: $SECRET_ARN"
          
          # Obter segredos atuais - falha graciosamente se não houver versão atual
          CURRENT_SECRETS=$(aws secretsmanager get-secret-value --secret-id "$SECRET_ARN" --region "${{ env.AWS_REGION }}" --query SecretString --output text 2>/dev/null || echo "{}")
          
          if [ -z "$CURRENT_SECRETS" ] || [ "$CURRENT_SECRETS" == "None" ] || [ "$CURRENT_SECRETS" == "null" ]; then
            CURRENT_SECRETS="{}"
          fi

          # Mesclar com os novos valores usando jq de forma robusta
          UPDATED_SECRETS=$(echo "$CURRENT_SECRETS" | jq \
            --arg db_url "$DATABASE_URL" \
            --arg direct_url "$DIRECT_URL" \
            --arg api_url "$NEXT_PUBLIC_API_URL" \
            --arg clerk_secret "$CLERK_SECRET_KEY" \
            --arg clerk_jwt "$CLERK_JWT_KEY" \
            --arg jwt_secret "$JWT_SECRET" \
            --arg clerk_publishable_key "$NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY" \
            '. + {
              DATABASE_URL: $db_url,
              DIRECT_URL: $direct_url,
              NEXT_PUBLIC_API_URL: $api_url,
              CLERK_SECRET_KEY: $clerk_secret,
              CLERK_JWT_KEY: $clerk_jwt,
              JWT_SECRET: $jwt_secret,
              NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: $clerk_publishable_key
            }')
          
          # Validar se o JSON gerado é válido antes de enviar
          if ! echo "$UPDATED_SECRETS" | jq empty; then
            echo "Error: Generated secrets JSON is invalid."
            exit 1
          fi

          # Atualizar no AWS Secrets Manager
          aws secretsmanager put-secret-value \
            --secret-id "$SECRET_ARN" \
            --secret-string "$UPDATED_SECRETS" \
            --region "${{ env.AWS_REGION }}"
          
          echo "Secrets updated successfully in AWS Secrets Manager."

  build-and-push:
    name: Build and Push to ECR (${{ matrix.service }})
    needs: [lint-unit-test, integration-e2e-tests, terraform]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [backend, frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push ${{ matrix.service }} image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.PROJECT_NAME }}-${{ matrix.service }}:latest
            ${{ steps.login-ecr.outputs.registry }}/${{ env.PROJECT_NAME }}-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          build-args: |
            NEXT_PUBLIC_API_URL=/api/v1
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
  deploy:
    name: Deploy to ECS
    needs: [build-and-push, terraform]
    runs-on: ubuntu-latest
    steps:
      - name: Verify AWS CLI
        run: aws --version

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Register new Backend task definition revision
        id: backend-task-def
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE: ${{ env.PROJECT_NAME }}-backend
        run: |
          # Fetch current task definition and update image to the SHA-tagged build
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition ${{ env.PROJECT_NAME }}-backend \
            --region ${{ env.AWS_REGION }} \
            --query 'taskDefinition' \
            --output json)

          NEW_IMAGE="$REGISTRY/$IMAGE:${{ github.sha }}"

          # Strip read-only ECS fields and inject new image
          NEW_TASK_DEF=$(echo "$TASK_DEF" | jq \
            --arg image "$NEW_IMAGE" \
            'del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.placementConstraints,.compatibilities,.registeredAt,.registeredBy) |
             .containerDefinitions[0].image = $image')

          NEW_TASK_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --region ${{ env.AWS_REGION }} \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "Registered backend task definition: $NEW_TASK_ARN"
          echo "task_def_arn=$NEW_TASK_ARN" >> $GITHUB_OUTPUT

      - name: Register new Frontend task definition revision
        id: frontend-task-def
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE: ${{ env.PROJECT_NAME }}-frontend
        run: |
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition ${{ env.PROJECT_NAME }}-frontend \
            --region ${{ env.AWS_REGION }} \
            --query 'taskDefinition' \
            --output json)

          NEW_IMAGE="$REGISTRY/$IMAGE:${{ github.sha }}"

          NEW_TASK_DEF=$(echo "$TASK_DEF" | jq \
            --arg image "$NEW_IMAGE" \
            'del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.placementConstraints,.compatibilities,.registeredAt,.registeredBy) |
             .containerDefinitions[0].image = $image')

          NEW_TASK_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --region ${{ env.AWS_REGION }} \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "Registered frontend task definition: $NEW_TASK_ARN"
          echo "task_def_arn=$NEW_TASK_ARN" >> $GITHUB_OUTPUT

      - name: Update ECS Services
        run: |
          echo "Updating backend service..."
          aws ecs update-service \
            --cluster ${{ env.PROJECT_NAME }}-cluster \
            --service ${{ env.PROJECT_NAME }}-backend-service \
            --task-definition ${{ steps.backend-task-def.outputs.task_def_arn }} \
            --region ${{ env.AWS_REGION }} > /dev/null

          echo "Updating frontend service..."
          aws ecs update-service \
            --cluster ${{ env.PROJECT_NAME }}-cluster \
            --service ${{ env.PROJECT_NAME }}-frontend-service \
            --task-definition ${{ steps.frontend-task-def.outputs.task_def_arn }} \
            --region ${{ env.AWS_REGION }} > /dev/null

      - name: Wait for Services to Stabilize
        run: |
          echo "Waiting for both services to stabilize..."
          aws ecs wait services-stable \
            --cluster ${{ env.PROJECT_NAME }}-cluster \
            --services ${{ env.PROJECT_NAME }}-backend-service \
            --region ${{ env.AWS_REGION }} &
            
          aws ecs wait services-stable \
            --cluster ${{ env.PROJECT_NAME }}-cluster \
            --services ${{ env.PROJECT_NAME }}-frontend-service \
            --region ${{ env.AWS_REGION }} &
            
          wait
          echo "All services are stable."
