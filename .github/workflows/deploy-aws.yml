name: Deploy to AWS (ECS Fargate)

on:
  push:
    branches:
      - main
  workflow_dispatch: # Permite disparar manualmente

env:
  PROJECT_NAME: devai
  ENVIRONMENT: dev
  BACKEND_BUCKET: ${{ vars.BACKEND_BUCKET }}
  AUTOMATION: true
  AWS_EC2_METADATA_DISABLED: true
  TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
  NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}

jobs:
  quality:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint Backend
        run: npm run lint --workspace=backend

      - name: Gerar schema
        run: npm run prisma:generate --workspace=backend

      - name: Test Backend
        run: npm run test --workspace=backend

      - name: Lint Frontend
        run: npm run lint --workspace=frontend

  terraform:
    name: Terraform Apply
    needs: quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./infra/environments/dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Ensure Terraform State Bucket
        run: |
          BUCKET_NAME="${{ env.BACKEND_BUCKET }}"
          REGION="${{ env.AWS_REGION }}"
          echo "Checking bucket $BUCKET_NAME in region $REGION..."
          
          if ! aws s3api head-bucket --bucket "$BUCKET_NAME" --region "$REGION" 2>/dev/null; then
            echo "Bucket $BUCKET_NAME not found. Creating..."
            if [ "$REGION" = "us-east-1" ]; then
              aws s3api create-bucket --bucket "$BUCKET_NAME" --region "$REGION"
            else
              aws s3api create-bucket --bucket "$BUCKET_NAME" --region "$REGION" --create-bucket-configuration LocationConstraint="$REGION"
            fi
            
            echo "Waiting for bucket to be available..."
            aws s3api wait bucket-exists --bucket "$BUCKET_NAME"
            
            echo "Configuring versioning..."
            aws s3api put-bucket-versioning --bucket "$BUCKET_NAME" --versioning-configuration Status=Enabled
            
            echo "Configuring encryption..."
            aws s3api put-bucket-encryption --bucket "$BUCKET_NAME" --server-side-encryption-configuration '{"Rules": [{"ApplyServerSideEncryptionByDefault": {"SSEAlgorithm": "AES256"}}]}'
          else
            echo "Bucket $BUCKET_NAME already exists."
          fi

      - name: Terraform Init
        run: terraform init -input=false -backend-config="bucket=${{ env.BACKEND_BUCKET }}"

      - name: Terraform Validate
        run: terraform validate -no-color

      - name: Terraform Plan
        run: terraform plan -input=false -no-color

      - name: Terraform Apply
        run: terraform apply -input=false -auto-approve -no-color

      - name: Update AWS Secrets
        run: |
          # Obter outputs do Terraform
          DB_ADDRESS=$(terraform output -raw db_instance_address)
          ALB_DNS=$(terraform output -raw alb_dns_name)
          
          # Construir variáveis
          DATABASE_URL="postgresql://postgres:${{ secrets.DB_PASSWORD }}@${DB_ADDRESS}:5432/devai?schema=public"
          DIRECT_URL="postgresql://postgres:${{ secrets.DB_PASSWORD }}@${DB_ADDRESS}:5432/devai?schema=public"
          NEXT_PUBLIC_API_URL="http://${ALB_DNS}"
          
          echo "Updating secrets for DATABASE_URL, DIRECT_URL and NEXT_PUBLIC_API_URL..."
          
          # Obter segredos atuais para não sobrescrever outros (como Clerk)
          CURRENT_SECRETS=$(aws secretsmanager get-secret-value --secret-id "${{ env.PROJECT_NAME }}-app-secrets" --region "${{ env.AWS_REGION }}" --query SecretString --output text 2>/dev/null || echo "{}")
          
          # Tratar caso o segredo exista mas ainda não tenha valor inicializado
          if [ -z "$CURRENT_SECRETS" ] || [ "$CURRENT_SECRETS" == "None" ]; then
            CURRENT_SECRETS="{}"
          fi

          # Mesclar com os novos valores
          UPDATED_SECRETS=$(echo "$CURRENT_SECRETS" | jq \
            --arg db_url "$DATABASE_URL" \
            --arg direct_url "$DIRECT_URL" \
            --arg api_url "$NEXT_PUBLIC_API_URL" \
            '. + {DATABASE_URL: $db_url, DIRECT_URL: $direct_url, NEXT_PUBLIC_API_URL: $api_url}')
          
          # Atualizar no AWS Secrets Manager
          aws secretsmanager put-secret-value \
            --secret-id "${{ env.PROJECT_NAME }}-app-secrets" \
            --secret-string "$UPDATED_SECRETS" \
            --region "${{ env.AWS_REGION }}"

  build-and-push:
    name: Build and Push to ECR
    needs: [quality, terraform]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Backend Build & Push
      - name: Build, tag, and push Backend image to Amazon ECR
        run: |
          docker build -t ${{ steps.login-ecr.outputs.registry }}/${{ env.PROJECT_NAME }}-backend:${{ github.sha }} \
                       -t ${{ steps.login-ecr.outputs.registry }}/${{ env.PROJECT_NAME }}-backend:latest \
                       -f apps/backend/Dockerfile .
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.PROJECT_NAME }}-backend:${{ github.sha }}
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.PROJECT_NAME }}-backend:latest

      # Frontend Build & Push
      - name: Build, tag, and push Frontend image to Amazon ECR
        run: |
          docker build -t ${{ steps.login-ecr.outputs.registry }}/${{ env.PROJECT_NAME }}-frontend:${{ github.sha }} \
                       -t ${{ steps.login-ecr.outputs.registry }}/${{ env.PROJECT_NAME }}-frontend:latest \
                       --build-arg NEXT_PUBLIC_API_URL=${{ env.NEXT_PUBLIC_API_URL }} \
                       -f apps/frontend/Dockerfile .
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.PROJECT_NAME }}-frontend:${{ github.sha }}
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.PROJECT_NAME }}-frontend:latest

  deploy:
    name: Deploy to ECS
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Update ECS Backend Service
        run: |
          aws ecs update-service --cluster ${{ env.PROJECT_NAME }}-cluster --service ${{ env.PROJECT_NAME }}-backend-service --force-new-deployment --region ${{ env.AWS_REGION }}

      - name: Update ECS Frontend Service
        run: |
          aws ecs update-service --cluster ${{ env.PROJECT_NAME }}-cluster --service ${{ env.PROJECT_NAME }}-frontend-service --force-new-deployment --region ${{ env.AWS_REGION }}
