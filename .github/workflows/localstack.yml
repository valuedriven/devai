name: Test on LocalStack

on:  
  workflow_dispatch

env:
  AWS_DEFAULT_REGION: us-east-1
  AWS_REGION: us-east-1
  AWS_ACCESS_KEY_ID: test
  AWS_SECRET_ACCESS_KEY: test
  BACKEND_BUCKET: devai-backend-bucket
  PROJECT_NAME: devai
  AWS_PAGER: ""
  TF_VAR_db_password: ${{ secrets.DB_PASSWORD || 'password' }}
  DB_PASSWORD: ${{ secrets.DB_PASSWORD || 'password' }}
  NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY || 'pk_test_mock' }}
  CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY || 'sk_test_mock' }}
  CLERK_JWT_KEY: ${{ secrets.CLERK_JWT_KEY || 'mock_jwt_key' }}
  JWT_SECRET: ${{ secrets.JWT_SECRET || 'mock_jwt_secret' }}

jobs:
  quality:
    name: Deploy on LocalStack
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Start Database
        run: docker compose up -d db

      - name: Gerar schema
        run: npm run prisma:generate --workspace=backend

      - name: Database Setup
        run: npm run db:reset
        working-directory: apps/backend

  terraform:
    name: Terraform Apply
    needs: [quality]
    outputs:
      alb_dns_name: ${{ steps.outputs.outputs.alb_dns_name }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./infra/environments/dev
    steps:
          
      - name: Start LocalStack (standard)
        if: ${{ !env.ACT }}
        uses: LocalStack/setup-localstack@main
        with:
          image-tag: 'latest'    
          install-awslocal: true
          use-pro: false
        env:
          LOCALSTACK_AUTH_TOKEN: ${{ secrets.LOCALSTACK_AUTH_TOKEN }}

      - name: Start LocalStack (Local/Act)
        if: ${{ env.ACT }}
        working-directory: .
        run: |
          pip install awscli terraform-local awscli-local --break-system-packages || pip install awscli terraform-local awscli-local
          
          # Remove existing localstack container if it exists
          docker rm -f localstack || true
          
          # Start LocalStack
          docker run -d --name localstack \
            -e LOCALSTACK_AUTH_TOKEN="${LOCALSTACK_AUTH_TOKEN:-ls-lujEQuBa-naxA-8183-0132-ripUbUqa4097}" \
            -p 4566:4566 -p 4510-4559:4510-4559 \
            localstack/localstack-pro:latest
          
          # Create bin directory for wrappers
          mkdir -p "$GITHUB_WORKSPACE/bin"
          
          # Create wrapper for aws
          cat << 'EOF' > "$GITHUB_WORKSPACE/bin/aws"
          #!/bin/bash
          if [ "$AWSLOCAL_RUNNING" = "1" ]; then
            REAL_AWS=$(PATH=$(echo "$PATH" | sed -e "s|$GITHUB_WORKSPACE/bin:||g") which aws)
            exec "$REAL_AWS" "$@"
          else
            export AWSLOCAL_RUNNING=1
            exec awslocal "$@"
          fi
          EOF
          chmod +x "$GITHUB_WORKSPACE/bin/aws"

          # Create wrapper for terraform
          cat << 'EOF' > "$GITHUB_WORKSPACE/bin/terraform"
          #!/bin/bash
          if [ "$TFLOCAL_RUNNING" = "1" ]; then
            REAL_TERRAFORM=$(PATH=$(echo "$PATH" | sed -e "s|$GITHUB_WORKSPACE/bin:||g") which terraform)
            exec "$REAL_TERRAFORM" "$@"
          else
            export TFLOCAL_RUNNING=1
            exec tflocal "$@"
          fi
          EOF
          chmod +x "$GITHUB_WORKSPACE/bin/terraform"
          
          # Add to PATH
          echo "$GITHUB_WORKSPACE/bin" >> $GITHUB_PATH
          
          # Wait for LocalStack
          echo "Waiting for LocalStack to be ready..."
          for i in {1..30}; do
            if curl -s http://localhost:4566/_localstack/health | grep -q '"version":'; then
              echo "LocalStack is ready!"
              break
            fi
            sleep 2
          done

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Prepend wrappers to PATH (Local/Act)
        if: ${{ env.ACT }}
        run: echo "$GITHUB_WORKSPACE/bin" >> $GITHUB_PATH

      - name: Ensure Terraform State Bucket
        run: |
          BUCKET_NAME="${{ env.BACKEND_BUCKET }}"
          REGION="${{ env.AWS_REGION }}"
          echo "Checking bucket $BUCKET_NAME in region $REGION..."
          
          if ! aws s3api head-bucket --bucket "$BUCKET_NAME" --region "$REGION" 2>/dev/null; then
            echo "Bucket $BUCKET_NAME not found. Creating..."
            if [ "$REGION" = "us-east-1" ]; then
              aws s3api create-bucket --bucket "$BUCKET_NAME" --region "$REGION"
            else
              aws s3api create-bucket --bucket "$BUCKET_NAME" --region "$REGION" --create-bucket-configuration LocationConstraint="$REGION"
            fi
            
            echo "Waiting for bucket to be available..."
            aws s3api wait bucket-exists --bucket "$BUCKET_NAME"
            
            echo "Configuring versioning..."
            aws s3api put-bucket-versioning --bucket "$BUCKET_NAME" --versioning-configuration Status=Enabled
            
            echo "Configuring encryption..."
            aws s3api put-bucket-encryption --bucket "$BUCKET_NAME" --server-side-encryption-configuration '{"Rules": [{"ApplyServerSideEncryptionByDefault": {"SSEAlgorithm": "AES256"}}]}'
          else
            echo "Bucket $BUCKET_NAME already exists."
          fi

      - name: Terraform Init
        run: terraform init -input=false -backend-config="bucket=${{ env.BACKEND_BUCKET }}"

      - name: Terraform Validate
        run: terraform validate -no-color

      - name: Terraform Plan
        if: ${{ !env.ACT }}
        run: terraform plan -input=false -no-color

      - name: Terraform Apply
        if: ${{ !env.ACT }}
        run: |
          terraform apply -input=false -auto-approve -no-color \
            -replace="module.compute.aws_ecs_task_definition.backend" \
            -replace="module.compute.aws_ecs_task_definition.frontend"

      - name: Set outputs
        id: outputs
        run: |
          if [ "$ACT" = "true" ]; then
            ALB_DNS="localhost"
          else
            ALB_DNS=$(terraform output -raw alb_dns_name)
          fi
          echo "alb_dns_name=$ALB_DNS" >> $GITHUB_OUTPUT


      - name: Update AWS Secrets
        run: |
          if [ "$ACT" = "true" ]; then
            DB_ADDRESS="localhost"
            ALB_DNS="localhost"
            SECRET_ARN="devai-secrets"
            echo "Mocking AWS Secrets update for ACT environment..."
            # Create the secret in LocalStack's Secrets Manager since it is available on community tier
            aws secretsmanager create-secret --name "devai-secrets" --secret-string "{}" --region "${{ env.AWS_REGION }}" || true
          else
            DB_ADDRESS=$(terraform output -raw db_instance_address)
            ALB_DNS=$(terraform output -raw alb_dns_name)
            SECRET_ARN=$(terraform output -raw secret_arn)
          fi
          
          if [ -z "$SECRET_ARN" ] || [ "$SECRET_ARN" == "null" ]; then
            echo "Error: secret_arn output not found from Terraform."
            exit 1
          fi

          # Construir variáveis
          DATABASE_URL="postgresql://postgres:${{ env.DB_PASSWORD }}@${DB_ADDRESS}:5432/devai?schema=public"
          DIRECT_URL="postgresql://postgres:${{ env.DB_PASSWORD }}@${DB_ADDRESS}:5432/devai?schema=public"
          NEXT_PUBLIC_API_URL="http://${ALB_DNS}/api/v1"
          
          echo "Updating secrets in Secrets Manager..."
          echo "Secret ARN: $SECRET_ARN"
          
          # Obter segredos atuais - falha graciosamente se não houver versão atual
          CURRENT_SECRETS=$(aws secretsmanager get-secret-value --secret-id "$SECRET_ARN" --region "${{ env.AWS_REGION }}" --query SecretString --output text 2>/dev/null || echo "{}")
          
          if [ -z "$CURRENT_SECRETS" ] || [ "$CURRENT_SECRETS" == "None" ] || [ "$CURRENT_SECRETS" == "null" ]; then
            CURRENT_SECRETS="{}"
          fi

          # Mesclar com os novos valores usando jq de forma robusta
          UPDATED_SECRETS=$(echo "$CURRENT_SECRETS" | jq \
            --arg db_url "$DATABASE_URL" \
            --arg direct_url "$DIRECT_URL" \
            --arg api_url "$NEXT_PUBLIC_API_URL" \
            --arg clerk_secret "$CLERK_SECRET_KEY" \
            --arg clerk_jwt "$CLERK_JWT_KEY" \
            --arg jwt_secret "$JWT_SECRET" \
            --arg clerk_publishable_key "$NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY" \
            '. + {
              DATABASE_URL: $db_url,
              DIRECT_URL: $direct_url,
              NEXT_PUBLIC_API_URL: $api_url,
              CLERK_SECRET_KEY: $clerk_secret,
              CLERK_JWT_KEY: $clerk_jwt,
              JWT_SECRET: $jwt_secret,
              NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: $clerk_publishable_key
            }')
          
          # Validar se o JSON gerado é válido antes de enviar
          if ! echo "$UPDATED_SECRETS" | jq empty; then
            echo "Error: Generated secrets JSON is invalid."
            exit 1
          fi

          # Atualizar no AWS Secrets Manager
          aws secretsmanager put-secret-value \
            --secret-id "$SECRET_ARN" \
            --secret-string "$UPDATED_SECRETS" \
            --region "${{ env.AWS_REGION }}"
          
          echo "Secrets updated successfully in AWS Secrets Manager."

