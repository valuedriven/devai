name: "Terraform Destroy"

on:
  workflow_dispatch:

env:
  PROJECT_NAME: devai
  ENVIRONMENT: dev
  TF_VAR_project_name: devai
  TF_VAR_environment: dev
  AUTOMATION: true
  AWS_EC2_METADATA_DISABLED: true
  AWS_PAGER: ""
  TF_VAR_notification_email: ${{ secrets.NOTIFICATION_EMAIL }}
  TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
  TF_VAR_aws_region: ${{ secrets.AWS_REGION }}
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}

jobs:
  terraform-destroy:
    name: "Terraform Destroy"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./infra/environments/dev
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Install AWS CLI (if missing)
        run: |
          if ! command -v aws &> /dev/null; then
            echo "Installing AWS CLI..."
            curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
            unzip -q awscliv2.zip
            sudo ./aws/install || ./aws/install -i /usr/local/aws-cli -b /usr/local/bin
            rm -rf awscliv2.zip aws
          fi

      - name: Verify AWS CLI
        run: aws --version

      - name: Ensure Terraform State Bucket
        id: tf-state-bucket
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          BUCKET_NAME="devai-tfstate-${ACCOUNT_ID}"
          REGION="${{ env.AWS_REGION }}"
          echo "bucket=$BUCKET_NAME" >> $GITHUB_OUTPUT
          echo "Using bucket $BUCKET_NAME in region $REGION (account $ACCOUNT_ID)..."
          
          if ! aws s3api head-bucket --bucket "$BUCKET_NAME" 2>/dev/null; then
            echo "Bucket $BUCKET_NAME not found. Creating..."
            if [ "$REGION" = "us-east-1" ]; then
              aws s3api create-bucket --bucket "$BUCKET_NAME" --region "$REGION" --no-cli-pager
            else
              aws s3api create-bucket --bucket "$BUCKET_NAME" --region "$REGION" --create-bucket-configuration LocationConstraint="$REGION" --no-cli-pager
            fi
            
            echo "Waiting for bucket to be available..."
            aws s3api wait bucket-exists --bucket "$BUCKET_NAME"
            
            echo "Configuring versioning..."
            aws s3api put-bucket-versioning --bucket "$BUCKET_NAME" --versioning-configuration Status=Enabled
            
            echo "Configuring encryption..."
            aws s3api put-bucket-encryption --bucket "$BUCKET_NAME" --server-side-encryption-configuration '{"Rules": [{"ApplyServerSideEncryptionByDefault": {"SSEAlgorithm": "AES256"}}]}'
          else
            echo "Bucket $BUCKET_NAME already exists."
          fi

      - name: Terraform Init
        run: terraform init -input=false -backend-config="bucket=${{ steps.tf-state-bucket.outputs.bucket }}" 


      - name: Terraform Plan Destroy
        run: terraform plan -destroy

      - name: Terraform Destroy
        run: terraform destroy -auto-approve
